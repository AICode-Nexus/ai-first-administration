<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; letter-spacing: 0; }
    .title { font-size: 38px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-size: 22px; font-weight: 600; fill: #475569; }
    .label { font-size: 24px; font-weight: 800; fill: #0f172a; }
    .small { font-size: 18px; font-weight: 650; fill: #64748b; }
    .white { fill: #ffffff; }
  </style>
  <image href="human-ai-boundary.png" width="1400" height="788" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1400" height="788" fill="#f8fafc" opacity="0.06"/>
  <g filter="url(#panelShadow)">
    <rect x="58" y="48" width="536" height="132" rx="30" fill="#ffffff" opacity="0.94" stroke="#dbeafe"/>
    <text x="96" y="102" class="title">AI 预审与人工审批边界</text>
    <text x="96" y="145" class="subtitle">AI 做整理和提醒，人做判断和担责</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="88" y="238" width="330" height="138" rx="28" fill="#0f766e" opacity="0.9"/>
    <text x="124" y="292" class="label white">AI 可以做</text>
    <text x="124" y="332" class="small white">提取信息、检查缺失、提示风险</text>
    <text x="124" y="362" class="small white">起草回复，但不做最终决定</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="708" y="52" width="150" height="58" rx="26" fill="#ecfeff" opacity="0.96" stroke="#99f6e4"/>
    <text x="783" y="90" text-anchor="middle" class="label">责任边界</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="854" y="202" width="392" height="146" rx="30" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="894" y="258" class="label">人必须负责</text>
    <text x="894" y="300" class="small">制度适用、资产状态、价格依据</text>
    <text x="894" y="330" class="small">最终审批、例外判断、责任承担</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="332" y="642" width="742" height="74" rx="30" fill="#fff7ed" opacity="0.96" stroke="#fed7aa"/>
    <text x="703" y="689" text-anchor="middle" class="label">安全底线：不审批、不编造、不声称查过系统</text>
  </g>
</svg>
