<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; letter-spacing: 0; }
    .title { font-size: 38px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-size: 22px; font-weight: 600; fill: #475569; }
    .label { font-size: 24px; font-weight: 800; fill: #0f172a; }
    .small { font-size: 17px; font-weight: 650; fill: #64748b; }
    .white { fill: #ffffff; }
  </style>
  <image href="ai-first-workflow-shift.png" width="1400" height="788" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1400" height="788" fill="#f8fafc" opacity="0.08"/>
  <g filter="url(#panelShadow)">
    <rect x="52" y="48" width="514" height="118" rx="28" fill="#ffffff" opacity="0.94" stroke="#cbd5e1"/>
    <text x="88" y="98" class="title">传统行政处理</text>
    <text x="88" y="137" class="subtitle">信息散、沟通多、每次从头做</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="744" y="48" width="570" height="118" rx="28" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="782" y="98" class="title">AI First 工作流</text>
    <text x="782" y="137" class="subtitle">先拆解任务，再预审、交付、复用</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="705" y="604" width="108" height="54" rx="20" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="759" y="639" text-anchor="middle" class="label">收集</text>
    <rect x="840" y="604" width="108" height="54" rx="20" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="894" y="639" text-anchor="middle" class="label">查缺</text>
    <rect x="975" y="604" width="108" height="54" rx="20" fill="#fff7ed" opacity="0.96" stroke="#fed7aa"/>
    <text x="1029" y="639" text-anchor="middle" class="label">标风险</text>
    <rect x="1110" y="604" width="108" height="54" rx="20" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="1164" y="639" text-anchor="middle" class="label">起草</text>
    <rect x="1245" y="604" width="108" height="54" rx="20" fill="#ccfbf1" opacity="0.96" stroke="#99f6e4"/>
    <text x="1299" y="639" text-anchor="middle" class="label">确认</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="790" y="682" width="464" height="58" rx="24" fill="#ecfeff" opacity="0.96" stroke="#99f6e4"/>
    <text x="1022" y="719" text-anchor="middle" class="subtitle">最终沉淀：模板 / Skill / 部门标准流程</text>
  </g>
