<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; letter-spacing: 0; }
    .title { font-size: 38px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-size: 22px; font-weight: 600; fill: #475569; }
    .label { font-size: 22px; font-weight: 800; fill: #0f172a; }
    .small { font-size: 17px; font-weight: 650; fill: #64748b; }
  </style>
  <image href="admin-skill-workshop.png" width="1400" height="788" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1400" height="788" fill="#f8fafc" opacity="0.08"/>
  <g filter="url(#panelShadow)">
    <rect x="70" y="58" width="518" height="124" rx="30" fill="#ffffff" opacity="0.94" stroke="#dbeafe"/>
    <text x="108" y="110" class="title">Skill 实操课堂</text>
    <text x="108" y="150" class="subtitle">跑预审、改变量、对照输出、复盘流程</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="830" y="102" width="155" height="56" rx="20" fill="#ecfeff" opacity="0.96" stroke="#99f6e4"/>
    <text x="908" y="139" text-anchor="middle" class="label">1 跑预审</text>
    <rect x="1012" y="176" width="155" height="56" rx="20" fill="#fff7ed" opacity="0.96" stroke="#fed7aa"/>
    <text x="1090" y="213" text-anchor="middle" class="label">2 查风险</text>
    <rect x="684" y="268" width="170" height="56" rx="20" fill="#eff6ff" opacity="0.96" stroke="#bfdbfe"/>
    <text x="769" y="305" text-anchor="middle" class="label">3 对照输出</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="122" y="612" width="540" height="88" rx="28" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="160" y="650" class="label">课堂产出</text>
    <text x="160" y="680" class="small">预审结果 + 申请人回复 + 下一版改进清单</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="860" y="620" width="404" height="72" rx="28" fill="#ecfeff" opacity="0.96" stroke="#99f6e4"/>
    <text x="1062" y="665" text-anchor="middle" class="label">可选：Record &amp; Replay 复盘演示</text>
  </g>
</svg>
