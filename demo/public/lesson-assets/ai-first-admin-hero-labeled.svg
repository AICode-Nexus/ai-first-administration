<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="panelBg" x1="70" y1="70" x2="620" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#eff6ff" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; letter-spacing: 0; }
    .title { font-size: 40px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-size: 23px; font-weight: 600; fill: #475569; }
    .chip { font-size: 21px; font-weight: 800; fill: #0f172a; }
    .small { font-size: 18px; font-weight: 650; fill: #64748b; }
  </style>
  <image href="ai-first-admin-hero.png" width="1400" height="788" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1400" height="788" fill="#f8fafc" opacity="0.06"/>
  <g filter="url(#panelShadow)">
    <rect x="64" y="66" width="600" height="252" rx="30" fill="url(#panelBg)" stroke="#dbeafe"/>
    <text x="104" y="132" class="title">AI First 行政预审工作流</text>
    <text x="104" y="180" class="subtitle">把散乱材料变成可检查、可复用、可追踪的标准流程</text>
    <rect x="104" y="218" width="132" height="54" rx="20" fill="#e0f2fe" stroke="#bae6fd"/>
    <text x="170" y="253" text-anchor="middle" class="chip">材料输入</text>
    <rect x="260" y="218" width="132" height="54" rx="20" fill="#ccfbf1" stroke="#99f6e4"/>
    <text x="326" y="253" text-anchor="middle" class="chip">AI 预审</text>
    <rect x="416" y="218" width="168" height="54" rx="20" fill="#fef3c7" stroke="#fde68a"/>
    <text x="500" y="253" text-anchor="middle" class="chip">人工确认</text>
  </g>
  <g filter="url(#panelShadow)">
    <rect x="908" y="558" width="404" height="110" rx="28" fill="#ffffff" opacity="0.94" stroke="#bfdbfe"/>
    <text x="936" y="606" class="chip">输出：摘要、风险、补充清单</text>
    <text x="936" y="643" class="small">审批人做最终判断，AI 只做预审助手</text>
  </g>
</svg>
